# Tuned to this codebase's house style, then gated on in CI (`--strict`).
disabled_rules:
  - trailing_comma        # multiline trailing commas are idiomatic here
  - todo

identifier_name:
  min_length:             # short locals (i, j, r, a, n, e) are idiomatic
    warning: 1
    error: 1
  max_length:
    warning: 50
    error: 60

type_name:
  max_length:
    warning: 50
    error: 60

line_length:
  warning: 160
  error: 200
  ignores_comments: true
  ignores_urls: true

large_tuple:
  warning: 3
  error: 4

nesting:
  type_level: 2           # DTOs legitimately nest response shapes

function_body_length:
  warning: 90
  error: 140

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 500
  error: 800

excluded:
  - .build
