name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create and publish (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  # Tag on a tag-push; the manual input on a workflow_dispatch run.
  REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: |
          swift build -c release --arch arm64 --arch x86_64
          BINPATH="$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)"
          mkdir -p dist
          cp "$BINPATH/xcrashlytics" dist/xcrashlytics
          strip dist/xcrashlytics || true
          lipo -info dist/xcrashlytics || true

      - name: Package + checksum
        run: |
          cd dist
          TARBALL="xcrashlytics-${REF_NAME}-macos-universal.tar.gz"
          tar -czf "$TARBALL" xcrashlytics
          shasum -a 256 "$TARBALL" | tee "$TARBALL.sha256"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$REF_NAME" \
            dist/*.tar.gz dist/*.sha256 \
            --target "$GITHUB_SHA" \
            --title "$REF_NAME" \
            --generate-notes

  formula:
    needs: release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update Homebrew formula
        run: |
          VERSION="${REF_NAME#v}"
          TARBALL="xcrashlytics-${REF_NAME}-macos-universal.tar.gz"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${REF_NAME}/${TARBALL}"
          curl -fsSL "$URL" -o "$TARBALL"
          SHA="$(shasum -a 256 "$TARBALL" | awk '{print $1}')"
          sed -i '' -E "s/  version \".*\"/  version \"${VERSION}\"/" Formula/xcrashlytics.rb
          sed -i '' -E "s/  sha256 \".*\"/  sha256 \"${SHA}\"/" Formula/xcrashlytics.rb
          cat Formula/xcrashlytics.rb

      - name: Commit formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/xcrashlytics.rb; then
            echo "Formula already up to date."
          else
            git add Formula/xcrashlytics.rb
            git commit -m "chore: update Homebrew formula for ${REF_NAME}"
            git push origin main
          fi
